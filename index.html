<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCI Studios | Deployment Paused</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            letter-spacing: -0.01em;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 12px;
            color: #666;
        }

        p {
            font-size: 19px;
            font-weight: 400;
            margin: 0;
            color: #efefef;
            animation: breathe 4s ease-in-out infinite;
        }

        .id-footer {
            position: absolute;
            bottom: 30px;
            font-family: "SF Mono", "Fira Code", monospace;
            font-size: 11px;
            color: #222; /* Very dark, subtle text */
            text-transform: lowercase;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.99); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DCI Studios</h1>
        <p>This deployment is temporarily paused</p>
    </div>

    <div class="id-footer" id="ray-id"></div>

    <script>
        function generateRay() {
            const chars = 'abcdef0123456789';
            let result = 'dci::';
            
            // Generate a random 16-character hash
            for (let i = 0; i < 16; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            // Add a timestamp-based suffix for realism
            result += '-' + Date.now().toString(16).slice(-8);
            
            document.getElementById('ray-id').innerText = result;
        }

        // Run on load
        generateRay();
    </script>
</body>
</html>
